name: CI C# SDK

on:
  pull_request:
    paths:
      - 'sdk/csharp/**'
  push:
    branches:
      - main
    paths:
      - 'sdk/csharp/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/csharp

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build solution
        run: dotnet build Agentspan.sln --configuration Release

      # Unit tests live under ``tests/Agentspan.*.Tests`` (OpenAI, GoogleADK,
      # SemanticKernel). They were authored but never wired into CI — the
      # workflow only ran ``dotnet build``. Run them all now via the solution
      # file. The ``AgentspanE2eTests`` project requires a live server and
      # is excluded by its own ``[Trait("Category","E2E")]`` filter
      # (handled separately in ci-csharp-sdk-e2e.yml, manual dispatch).
      - name: Run unit tests
        run: |
          dotnet test Agentspan.sln \
            --configuration Release \
            --no-build \
            --filter "FullyQualifiedName!~AgentspanE2eTests" \
            --logger "console;verbosity=normal" \
            --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: csharp-test-results
          path: sdk/csharp/tests/**/TestResults/*.trx
          retention-days: 14
