site_name: Agentspan Docs
site_description: Documentation for building durable AI agents with Agentspan.
site_url: https://agentspan.ai/docs/
repo_url: https://github.com/agentspan-ai/agentspan
repo_name: agentspan-ai/agentspan
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site
strict: true

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

not_in_nav: |
  design/**
  sdk-design/**
  superpowers/**
  python-sdk/**
  typescript-sdk/**
  langchain-integration.md
  langgraph-integration.md
  local-code-execution-design.md

exclude_docs: |
  /guardrails.md
  design/**
  sdk-design/**
  superpowers/**
  python-sdk/**
  typescript-sdk/**
  langchain-integration.md
  langgraph-integration.md
  local-code-execution-design.md

nav:
  - Overview: index.md
  - Getting Started:
      - Why Agentspan: why-agentspan.md
      - Quickstart: quickstart.md
  - Concepts:
      - Agents: concepts/agents.md
      - Tools: concepts/tools.md
      - Skills: concepts/skills.md
      - Multi-Agent Strategies: concepts/multi-agent.md
      - Plan-Execute (PAC/PAE): concepts/plan-execute.md
      - Guardrails: concepts/guardrails.md
      - Memory: concepts/memory.md
      - Streaming: concepts/streaming.md
      - Scheduling: scheduling.md
      - Testing: concepts/testing.md
  - Examples:
      - Support Ticket Triage: examples/support-triage.md
      - Research Pipeline: examples/research-pipeline.md
      - Batch Document Processor: examples/document-processor.md
      - Crash and Resume: examples/crash-resume.md
      - Human in the Loop: examples/human-in-the-loop.md
      - LangGraph Code Review Bot: examples/langgraph.md
      - OpenAI Agents SDK Customer Support: examples/openai-agents-sdk.md
      - Google ADK Research Assistant: examples/google-adk.md
  - Java SDK:
      - Overview: java-sdk/index.md
      - Getting Started: java-sdk/getting-started.md
      - Core Concepts:
          - Agents: java-sdk/concepts/agents.md
          - Agent Field Reference: java-sdk/agent-structure.md
          - Agent JSON Schema: java-sdk/agent-schema.md
          - Tools: java-sdk/concepts/tools.md
          - Multi-Agent: java-sdk/concepts/multi-agent.md
          - Guardrails: java-sdk/concepts/guardrails.md
          - Termination: java-sdk/concepts/termination.md
          - Scheduling: java-sdk/concepts/scheduling.md
          - Skills: java-sdk/concepts/skills.md
      - Frameworks:
          - LangChain4j: java-sdk/frameworks/langchain4j.md
          - OpenAI Agents SDK: java-sdk/frameworks/openai.md
          - Google ADK: java-sdk/frameworks/google-adk.md
      - Spring Boot: java-sdk/spring-boot.md
      - API Reference:
          - AgentRuntime: java-sdk/agent-runtime-api.md
          - AgentClient (internal): java-sdk/agent-client-api.md
          - Public API summary: java-sdk/api-reference.md
  - Reference:
      - Providers: providers.md
      - AI Models: ai-models.md
      - CLI: cli.md
      - Deployment: deployment.md
      - Self-Hosting: self-hosting.md
      - Integrations: integrations.md
      - Worker Types: worker-types.md
