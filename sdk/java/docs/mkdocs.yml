site_name: Agentspan Java SDK
site_description: Build durable AI agents in Java with Agentspan.
site_url: https://agentspan.ai/docs/java-sdk/
repo_url: https://github.com/agentspan-ai/agentspan
repo_name: agentspan-ai/agentspan
edit_uri: edit/main/sdk/java/docs/

docs_dir: .
site_dir: ../../build/site/java-sdk
strict: false

theme:
  name: material
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Overview: index.md
  - Getting Started: getting-started.md
  - Core Concepts:
      - Agents: concepts/agents.md
      - Tools: concepts/tools.md
      - Multi-Agent: concepts/multi-agent.md
      - Guardrails: concepts/guardrails.md
      - Termination: concepts/termination.md
      - Scheduling: concepts/scheduling.md
      - Skills: concepts/skills.md
  - Frameworks:
      - LangChain4j: frameworks/langchain4j.md
      - OpenAI Agents SDK: frameworks/openai.md
      - Google ADK: frameworks/google-adk.md
  - Spring Boot: spring-boot.md
  - API Reference: api-reference.md
  - Control-Plane API: agent-client-api.md
