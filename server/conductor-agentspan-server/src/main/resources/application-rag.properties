# Activate with: --spring.profiles.active=rag
# Combine with postgres backend: --spring.profiles.active=postgres,rag

# =============================================================================
# Vector Database — PostgreSQL + pgvector
# =============================================================================
# Requires: CREATE DATABASE vectordb; \c vectordb; CREATE EXTENSION vector;
conductor.vectordb.instances[0].name=pgvectordb
conductor.vectordb.instances[0].type=postgres
conductor.vectordb.instances[0].postgres.datasourceURL=${PGVECTOR_JDBC_URL:jdbc:postgresql://localhost:5432/agentspan}
conductor.vectordb.instances[0].postgres.user=${PGVECTOR_USER:postgres}
conductor.vectordb.instances[0].postgres.password=${PGVECTOR_PASSWORD:postgres}
conductor.vectordb.instances[0].postgres.dimensions=${PGVECTOR_DIMENSIONS:1536}
conductor.vectordb.instances[0].postgres.distanceMetric=${PGVECTOR_DISTANCE:cosine}
conductor.vectordb.instances[0].postgres.indexingMethod=${PGVECTOR_INDEX_METHOD:ivfflat}
